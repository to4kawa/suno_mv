<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" >
    <title>Suno MV App</title>
    <style>
        body { font-family: sans-serif; padding: 20px; color: #222; }
        button, input, select { font: inherit; }
        button { margin: 4px 4px 4px 0; }
        #drop-area {
            width: 100%; height: 200px; border: 2px dashed #aaa;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 10px;
        }
        #preview-img {
            max-width: 100%; max-height: 150px;
            display: block; margin-top: 10px;
        }
        details {
            border: 1px solid #d4d4d4;
            padding: 12px;
            margin: 14px 0;
        }
        summary { cursor: pointer; font-weight: 700; }
        fieldset {
            border: 1px solid #ddd;
            margin: 12px 0;
            padding: 10px;
        }
        label { display: block; margin: 8px 0; }
        .settings-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .settings-row input[type="text"] { flex: 1 1 320px; min-width: 220px; }
        #ffmpeg-status { white-space: pre-wrap; margin-top: 8px; }
    </style>
</head>
<body>
    <h1>Suno MV Maker</h1>
    
    <input id="url-input" type="text" placeholder="Paste Suno URL here" style="width: 100%;" >
    <button id="preview-btn">Preview</button>
    <button id="generate-btn">Generate MP4</button>

    <details id="settings-panel">
        <summary>Settings</summary>

        <fieldset>
            <legend>Output</legend>
            <label for="save-folder-input">Save folder</label>
            <div class="settings-row">
                <input id="save-folder-input" type="text" placeholder="Default: app-data/output" >
                <button id="choose-folder-btn" type="button">Choose</button>
                <button id="open-folder-btn" type="button">Open</button>
            </div>
        </fieldset>

        <fieldset>
            <legend>FFmpeg</legend>
            <label>
                <input id="ffmpeg-auto-detect-input" type="checkbox" >
                Auto detect
            </label>
            <label for="ffmpeg-path-input">FFmpeg path</label>
            <div class="settings-row">
                <input id="ffmpeg-path-input" type="text" placeholder="C:\ffmpeg\bin\ffmpeg.exe" >
                <button id="choose-ffmpeg-btn" type="button">Choose ffmpeg.exe</button>
                <button id="test-ffmpeg-btn" type="button">Test FFmpeg</button>
            </div>
            <div id="ffmpeg-status">Status: Not tested</div>
        </fieldset>

        <fieldset>
            <legend>Encoding</legend>
            <label for="encoder-preset-input">Preset</label>
            <select id="encoder-preset-input">
                <option value="cpu_x264">CPU / x264</option>
                <option value="amd_amf">AMD / AMF</option>
            </select>

            <label for="quality-input">Quality</label>
            <select id="quality-input">
                <option value="standard">Standard</option>
                <option value="high">High</option>
            </select>
        </fieldset>
    </details>

    <div id="drop-area">Drag and drop cover image here</div>
    <img id="preview-img" src="" alt="Cover Preview" >
    <pre id="log"></pre>

    <script src="renderer.js"></script>
</body>
</html>
